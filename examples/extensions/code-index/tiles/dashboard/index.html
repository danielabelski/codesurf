<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Code Index</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--ct-bg, #1e1e1e);
      color: var(--ct-text, #e8e8e8);
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(100%, 280px);
      border: 1px solid var(--ct-border, #333);
      border-radius: 8px;
      background: var(--ct-panel, #252525);
      padding: 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--ct-dim, #9ca3af);
    }
  </style>
</head>
<body>
  <main>
    <h1>Code Index</h1>
    <p>This surface is inactive while indexing moves into the shared CLI daemon.</p>
  </main>
</body>
</html>
