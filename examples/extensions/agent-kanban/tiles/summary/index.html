<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agent Summary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--ct-bg, transparent);
      --panel: var(--ct-panel, rgba(0,0,0,.04));
      --panel-2: var(--ct-panel-2, rgba(0,0,0,.06));
      --border: var(--ct-border, rgba(0,0,0,.12));
      --text: var(--ct-text, #111);
      --muted: var(--ct-dim, #64748b);
      --accent: var(--ct-accent, #4f46e5);
      --success: var(--ct-success, #1f8f5f);
      --warning: var(--ct-warning, #c07b12);
      --danger: var(--ct-danger, #dc2626);
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px 0 14px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .topbar-copy {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .eyebrow {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }
    .project {
      font-size: 14px;
      line-height: 1.25;
      color: var(--text);
      font-weight: 700;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .refresh {
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      flex-shrink: 0;
      padding: 0;
    }
    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .section-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 8px;
    }
    .stat {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 12px;
      padding: 10px 11px;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      line-height: 1.1;
    }
    .stat-value {
      font-size: 19px;
      font-weight: 700;
      line-height: 1;
    }
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.35;
    }
    .dot {
      width: 22px;
      height: 22px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: var(--panel);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 800;
      margin-top: 1px;
    }
    .item.done .dot {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 45%, var(--border));
    }
    .item-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
      line-height: 1.3;
    }
    .item-meta {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .source {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      white-space: nowrap;
    }
    .empty {
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="root">
    <div class="topbar">
      <div class="topbar-copy">
        <div class="eyebrow">Agent Summary</div>
        <div class="project" id="projectLabel">No project</div>
      </div>
      <button class="refresh" id="refreshBtn">Refresh</button>
    </div>
    <div class="content">
      <section>
        <div class="section-title">Progress</div>
        <div class="stats" id="stats"></div>
      </section>

      <section>
        <div class="section-title">Checklist</div>
        <div class="checklist" id="checklist"></div>
      </section>

      <section>
        <div class="section-title">Sources</div>
        <div class="sources" id="sources"></div>
      </section>
    </div>
  </div>

  <script>
    let bridge = null
    let workspacePath = ''

    function esc(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    async function initBridge(b) {
      bridge = b
      try {
        if (bridge.workspace && bridge.workspace.getPath) {
          workspacePath = await bridge.workspace.getPath() || ''
        }
      } catch {}
      await loadSummary()
      await bridge.bus.subscribe('agent-kanban:summary-updated')
      await bridge.bus.subscribe('agent-kanban:board-updated')
    }

    async function loadSummary() {
      if (!bridge) return
      try {
        const summary = await bridge.ext.invoke('getSummary', workspacePath)
        renderSummary(summary)
      } catch (error) {
        console.error('summary load failed', error)
      }
    }

    function renderSummary(summary) {
      const projectLabel = document.getElementById('projectLabel')
      const stats = document.getElementById('stats')
      const checklist = document.getElementById('checklist')
      const sources = document.getElementById('sources')

      projectLabel.textContent = summary && summary.projectName ? summary.projectName : 'No project'

      const counts = summary && summary.counts ? summary.counts : {}
      const statItems = [
        { label: 'Active', value: counts.active || 0, color: 'var(--success)' },
        { label: 'Review', value: counts.review || 0, color: 'var(--warning)' },
        { label: 'Backlog', value: counts.backlog || 0, color: 'var(--muted)' },
        { label: 'Done', value: counts.completed || 0, color: 'var(--text)' },
        { label: 'Failed', value: counts.failed || 0, color: 'var(--danger)' },
      ]

      stats.innerHTML = statItems.map(item => (
        '<div class="stat">' +
          '<div class="stat-label">' + esc(item.label) + '</div>' +
          '<div class="stat-value" style="color:' + item.color + '">' + esc(item.value) + '</div>' +
        '</div>'
      )).join('')

      const items = Array.isArray(summary && summary.checklist) ? summary.checklist : []
      checklist.innerHTML = items.length > 0
        ? items.map(item => (
            '<div class="item' + (item.done ? ' done' : '') + '">' +
              '<div class="dot">' + (item.done ? '✓' : '') + '</div>' +
              '<div style="min-width:0;">' +
                '<div class="item-title">' + esc(item.title) + '</div>' +
                '<div class="item-meta">' + esc(item.columnId || item.state || '') + '</div>' +
              '</div>' +
            '</div>'
          )).join('')
        : '<div class="empty">No active tasks</div>'

      const sourceItems = ['Kanban board', 'Daemon task events', 'Linked task sessions']
      sources.innerHTML = sourceItems.map(label => (
        '<div class="source"><span>•</span><span>' + esc(label) + '</span></div>'
      )).join('')
    }

    function handleBusMessage(msg) {
      if (!msg || !msg.event) return
      if (msg.event === 'bus.event.agent-kanban:summary-updated') {
        renderSummary(msg.data || {})
        return
      }
      if (msg.event === 'bus.event.agent-kanban:board-updated') {
        loadSummary()
      }
    }

    window.addEventListener('message', e => {
      if (e.data && e.data.type === 'contex-bridge-ready') initBridge(window.contex)
      if (e.data && e.data.type === 'contex-event') handleBusMessage(e.data)
    })

    if (window.contex) initBridge(window.contex)

    document.getElementById('refreshBtn').addEventListener('click', loadSummary)
  </script>
</body>
</html>
