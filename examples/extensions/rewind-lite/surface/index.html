<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body {
    color: var(--ct-text, #111);
    font-family: var(--ct-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-columns: minmax(240px, 0.95fr) minmax(280px, 1.05fr);
    gap: 12px;
    height: 100%;
    padding: 10px;
  }
  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    gap: 10px;
  }
  .toolbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--ct-dim, #888);
    font-weight: 600;
  }
  .meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .meta .row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.05));
  }
  .meta .row strong {
    font-size: 11px;
    color: var(--ct-dim, #888);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .digest {
    flex: 1;
    min-height: 0;
    overflow: auto;
    white-space: pre-wrap;
    font-size: 12px;
    line-height: 1.5;
  }
  .empty, .error {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 120px;
    text-align: center;
    padding: 18px;
    color: var(--ct-dim, #888);
  }
  .error {
    color: var(--ct-danger, #dc2626);
  }
  @media (max-width: 760px) {
    .app {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <section class="panel ct-card">
      <div>
        <div class="ct-toolbar-title">Rewind Digest</div>
        <div class="ct-muted">Backend-powered chat surface using ext.invoke, settings, and workspace metadata.</div>
      </div>

      <div class="field">
        <label for="commitLimit">Recent commits</label>
        <input id="commitLimit" type="number" min="1" max="12" step="1">
      </div>

      <div class="toolbar-row">
        <button id="saveBtn" type="button">Save setting</button>
        <button id="refreshBtn" type="button" class="primary">Refresh digest</button>
      </div>

      <div class="meta">
        <div class="row">
          <strong>Workspace path</strong>
          <span id="workspacePathText">Waiting for bridge…</span>
        </div>
        <div class="row">
          <strong>Workspace id</strong>
          <span id="workspaceIdText">—</span>
        </div>
        <div class="row">
          <strong>Status</strong>
          <span id="statusText">Idle</span>
        </div>
      </div>
    </section>

    <section class="panel ct-card">
      <div class="toolbar-row">
        <div class="ct-toolbar-title">Digest preview</div>
        <div class="ct-pill" id="lineCountPill">0 lines</div>
      </div>
      <div id="digestBox" class="digest empty">Refresh to generate a workspace rewind digest.</div>
    </section>
  </div>

<script>
  const state = {
    ready: false,
    meta: null,
    workspacePath: '',
    digest: '',
    commitLimit: 5,
  }

  function $(id) { return document.getElementById(id) }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
  }

  function publishDigest() {
    if (!window.contex || !window.contex.surface) return
    if (!state.digest) {
      window.contex.surface.clear()
      return
    }
    window.contex.surface.setPayload({
      kind: 'text',
      data: state.digest,
      mime: 'text/markdown',
      ext: 'md',
    })
  }

  function render() {
    $('workspacePathText').textContent = state.workspacePath || 'No workspace path available'
    $('workspaceIdText').textContent = state.meta && state.meta.workspaceId ? state.meta.workspaceId : '—'
    $('commitLimit').value = String(state.commitLimit)
    const lineCount = state.digest ? state.digest.split(/\r?\n/).length : 0
    $('lineCountPill').textContent = lineCount + (lineCount === 1 ? ' line' : ' lines')

    const box = $('digestBox')
    if (!state.digest) {
      box.className = 'digest empty'
      box.textContent = 'Refresh to generate a workspace rewind digest.'
    } else {
      box.className = 'digest'
      box.innerHTML = escapeHtml(state.digest)
    }
    publishDigest()
  }

  async function refreshDigest() {
    if (!window.contex || !window.contex.ext || !state.workspacePath) return
    $('statusText').textContent = 'Refreshing…'
    try {
      state.digest = String(await window.contex.ext.invoke(
        'digest',
        state.workspacePath,
        state.meta && state.meta.workspaceId ? state.meta.workspaceId : '',
        { commitLimit: state.commitLimit },
      ) || '')
      $('statusText').textContent = state.digest ? 'Ready to attach' : 'Empty'
      render()
    } catch (error) {
      state.digest = ''
      const box = $('digestBox')
      box.className = 'digest error'
      box.textContent = error && error.message ? error.message : String(error)
      $('statusText').textContent = 'Error'
      publishDigest()
    }
  }

  async function saveCommitLimit() {
    if (!window.contex || !window.contex.settings) return
    const nextValue = Math.max(1, Math.min(12, Number($('commitLimit').value) || 5))
    state.commitLimit = nextValue
    await window.contex.settings.set({ commitLimit: nextValue })
    $('statusText').textContent = 'Setting saved'
    render()
  }

  async function init() {
    if (!window.contex || state.ready) return
    state.ready = true
    state.meta = await window.contex.tile.getMeta()
    state.workspacePath = await window.contex.workspace.getPath()
    const settings = await window.contex.settings.get()
    state.commitLimit = Math.max(1, Math.min(12, Number(settings && settings.commitLimit) || 5))

    $('refreshBtn').onclick = refreshDigest
    $('saveBtn').onclick = saveCommitLimit

    if (window.contex.surface) {
      window.contex.surface.onRequestFlush(refreshDigest)
      window.contex.surface.onClear(function() {
        state.digest = ''
        $('statusText').textContent = 'Cleared'
        render()
      })
    }

    render()
    await refreshDigest()
  }

  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'contex-bridge-ready') init()
  })

  if (window.contex) init()
  setTimeout(function() {
    if (window.contex) init()
  }, 50)
</script>
</body>
</html>
