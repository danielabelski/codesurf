<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body {
    color: var(--ct-text, #111);
    font-family: var(--ct-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    overflow: hidden;
  }
  .app {
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 100%;
    padding: 10px;
  }
  .toolbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar-row .actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }
  .stat-card {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ct-dim, #888);
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--ct-text, #111);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    min-height: 0;
    flex: 1;
  }
  .section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    gap: 8px;
  }
  .section .ct-list {
    overflow: auto;
    min-height: 0;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    border-radius: 8px;
    background: var(--ct-panel-2, rgba(0,0,0,.05));
  }
  .row code {
    font-family: var(--ct-font-mono, ui-monospace, monospace);
    font-size: 11px;
  }
  .digest {
    white-space: pre-wrap;
    overflow: auto;
    min-height: 0;
    flex: 1;
    font-size: 12px;
    line-height: 1.5;
  }
  .empty, .error {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 120px;
    text-align: center;
    padding: 24px;
    color: var(--ct-dim, #888);
  }
  .error {
    color: var(--ct-danger, #dc2626);
  }
  @media (max-width: 820px) {
    .stats,
    .grid {
      grid-template-columns: 1fr 1fr;
    }
  }
  @media (max-width: 620px) {
    .stats,
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <section class="ct-card">
      <div class="toolbar-row">
        <div>
          <div class="ct-toolbar-title">Rewind Lite</div>
          <div class="ct-muted" id="workspaceText">Waiting for workspace metadata…</div>
        </div>
        <div class="actions">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;">
            <input id="autoPublishToggle" type="checkbox">
            Auto publish digest context
          </label>
          <button id="publishBtn" type="button">Publish digest</button>
          <button id="refreshBtn" type="button" class="primary">Refresh</button>
        </div>
      </div>
    </section>

    <section class="stats">
      <div class="ct-card stat-card">
        <div class="stat-label">Branch</div>
        <div class="stat-value" id="branchValue">—</div>
      </div>
      <div class="ct-card stat-card">
        <div class="stat-label">Dirty Files</div>
        <div class="stat-value" id="dirtyValue">0</div>
      </div>
      <div class="ct-card stat-card">
        <div class="stat-label">Canvas Tiles</div>
        <div class="stat-value" id="tileValue">0</div>
      </div>
      <div class="ct-card stat-card">
        <div class="stat-label">Recent Commits</div>
        <div class="stat-value" id="commitValue">0</div>
      </div>
    </section>

    <section class="grid">
      <div class="section ct-card">
        <div class="toolbar-row">
          <div class="ct-toolbar-title">Recent commits</div>
          <div class="ct-pill" id="generatedAtPill">Not generated</div>
        </div>
        <div class="ct-list" id="commitList"></div>
      </div>

      <div class="section ct-card">
        <div class="ct-toolbar-title">Canvas shape</div>
        <div class="ct-list" id="tileTypeList"></div>
      </div>

      <div class="section ct-card">
        <div class="ct-toolbar-title">Dirty files</div>
        <div class="ct-list" id="dirtyList"></div>
      </div>

      <div class="section ct-card">
        <div class="ct-toolbar-title">Digest</div>
        <div id="digestBox" class="digest empty">Refresh to build a workspace digest.</div>
      </div>
    </section>
  </div>

<script>
  const state = {
    meta: null,
    settings: { commitLimit: 5, autoPublishContext: true },
    snapshot: null,
    digest: '',
    ready: false,
    loading: false,
  }

  function $(id) {
    return document.getElementById(id)
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
  }

  function renderRows(target, rows, formatter) {
    target.innerHTML = ''
    if (!rows || rows.length === 0) {
      const empty = document.createElement('div')
      empty.className = 'empty'
      empty.textContent = 'Nothing to show yet.'
      target.appendChild(empty)
      return
    }
    rows.forEach(function(row) {
      target.appendChild(formatter(row))
    })
  }

  function publishDigestContext(force) {
    if (!window.contex || !window.contex.context || !state.digest) return
    if (!force && !state.settings.autoPublishContext) return
    window.contex.context.set('ctx:rewind:snapshot', {
      generatedAt: state.snapshot ? state.snapshot.generatedAt : Date.now(),
      digest: state.digest,
      branch: state.snapshot && state.snapshot.git ? state.snapshot.git.branch : null,
      dirtyCount: state.snapshot && state.snapshot.git ? state.snapshot.git.dirtyCount : 0,
      tileCount: state.snapshot && state.snapshot.canvas ? state.snapshot.canvas.tileCount : 0,
    })
  }

  function render() {
    const meta = state.meta
    $('workspaceText').textContent = meta
      ? (meta.workspacePath || '(no workspace path)')
      : 'Waiting for workspace metadata…'

    $('autoPublishToggle').checked = !!state.settings.autoPublishContext

    const snapshot = state.snapshot
    $('branchValue').textContent = snapshot && snapshot.git && snapshot.git.branch ? snapshot.git.branch : '—'
    $('dirtyValue').textContent = snapshot && snapshot.git ? String(snapshot.git.dirtyCount || 0) : '0'
    $('tileValue').textContent = snapshot && snapshot.canvas ? String(snapshot.canvas.tileCount || 0) : '0'
    $('commitValue').textContent = snapshot && snapshot.git ? String((snapshot.git.commits || []).length) : '0'
    $('generatedAtPill').textContent = snapshot ? new Date(snapshot.generatedAt).toLocaleTimeString() : 'Not generated'

    renderRows($('commitList'), snapshot && snapshot.git ? snapshot.git.commits : [], function(line) {
      const row = document.createElement('div')
      row.className = 'row'
      row.innerHTML = '<code>' + escapeHtml(line) + '</code>'
      return row
    })

    renderRows($('tileTypeList'), snapshot && snapshot.canvas ? snapshot.canvas.tileTypes : [], function(item) {
      const row = document.createElement('div')
      row.className = 'row'
      row.innerHTML = '<span>' + escapeHtml(item.type) + '</span><strong>' + escapeHtml(item.count) + '</strong>'
      return row
    })

    renderRows($('dirtyList'), snapshot && snapshot.git ? snapshot.git.dirtyFiles : [], function(line) {
      const row = document.createElement('div')
      row.className = 'row'
      row.innerHTML = '<code>' + escapeHtml(line) + '</code>'
      return row
    })

    const digestBox = $('digestBox')
    if (!state.digest) {
      digestBox.className = 'digest empty'
      digestBox.textContent = state.loading ? 'Refreshing workspace digest…' : 'Refresh to build a workspace digest.'
    } else {
      digestBox.className = 'digest'
      digestBox.innerHTML = escapeHtml(state.digest)
    }
  }

  async function refreshSnapshot() {
    if (!state.meta || !window.contex || !window.contex.ext) return
    state.loading = true
    state.digest = ''
    render()
    try {
      const payload = await window.contex.ext.invoke(
        'snapshot',
        state.meta.workspacePath,
        state.meta.workspaceId,
        { commitLimit: Number(state.settings.commitLimit) || 5 },
      )
      state.snapshot = payload && payload.snapshot ? payload.snapshot : null
      state.digest = payload && payload.digest ? String(payload.digest) : ''
      render()
      publishDigestContext(false)
      return { ok: true, generatedAt: state.snapshot ? state.snapshot.generatedAt : Date.now() }
    } catch (error) {
      state.snapshot = null
      state.digest = ''
      const digestBox = $('digestBox')
      digestBox.className = 'digest error'
      digestBox.textContent = error && error.message ? error.message : String(error)
      return { ok: false, error: error && error.message ? error.message : String(error) }
    } finally {
      state.loading = false
      render()
    }
  }

  function registerActions() {
    if (!window.contex || !window.contex.actions) return
    window.contex.actions.register('refresh', 'Refresh the Rewind Lite snapshot', function() {
      return refreshSnapshot()
    })
    window.contex.actions.register('getDigest', 'Return the current Rewind Lite digest', function() {
      return { digest: state.digest, snapshot: state.snapshot }
    })
  }

  async function init() {
    if (!window.contex || state.ready) return
    state.ready = true
    state.meta = await window.contex.tile.getMeta()
    const settings = await window.contex.settings.get()
    state.settings = Object.assign({}, state.settings, settings || {})
    const storedPrefs = await window.contex.tile.getState('prefs')
    if (storedPrefs && typeof storedPrefs === 'object') {
      state.settings.autoPublishContext = storedPrefs.autoPublishContext !== false
    }

    $('refreshBtn').onclick = function() { refreshSnapshot() }
    $('publishBtn').onclick = function() { publishDigestContext(true) }
    $('autoPublishToggle').onchange = function(event) {
      state.settings.autoPublishContext = !!event.target.checked
      window.contex.tile.setState('prefs', { autoPublishContext: state.settings.autoPublishContext })
      render()
    }

    registerActions()
    render()
    await refreshSnapshot()
  }

  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'contex-bridge-ready') {
      init()
    }
  })

  if (window.contex) init()
  setTimeout(function() {
    if (window.contex) init()
  }, 50)
</script>
</body>
</html>
