<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    color: var(--ct-text, #111);
    font-family: var(--ct-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    overflow: hidden;
  }
  .app {
    display: flex;
    flex-direction: column;
    gap: 10px;
    height: 100%;
    padding: 10px;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .prompt {
    width: 100%;
    min-height: 88px;
    resize: vertical;
    line-height: 1.5;
  }
  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .segmented {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px;
    border-radius: 999px;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
  }
  .segmented button {
    min-width: 34px;
    height: 28px;
    padding: 0 10px;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: var(--ct-muted, #666);
    font-size: 11px;
    font-family: inherit;
  }
  .segmented button.active {
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    color: var(--ct-accent, #4f46e5);
    border: 1px solid color-mix(in srgb, var(--ct-accent, #4f46e5) 22%, transparent);
  }
  .variant-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .variant-tab {
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    background: var(--ct-panel-2, rgba(0,0,0,.06));
    color: var(--ct-muted, #666);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 11px;
    white-space: nowrap;
  }
  .variant-tab.active {
    background: var(--ct-accent-s, rgba(79,70,229,.12));
    color: var(--ct-accent, #4f46e5);
    border-color: color-mix(in srgb, var(--ct-accent, #4f46e5) 22%, transparent);
  }
  .preview-card {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
    overflow: hidden;
  }
  .preview-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .preview-meta-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--ct-dim, #999);
    flex-shrink: 0;
  }
  .status-dot.ready { background: var(--ct-success, #1f8f5f); }
  .status-dot.generating { background: var(--ct-accent, #4f46e5); }
  .status-dot.error { background: var(--ct-danger, #dc2626); }
  .preview-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--ct-text, #111);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preview-subtitle {
    font-size: 10px;
    color: var(--ct-dim, #999);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preview-frame {
    flex: 1;
    min-height: 0;
    border: 1px solid var(--ct-border, rgba(0,0,0,.1));
    border-radius: 10px;
    overflow: hidden;
    background: var(--ct-panel-2, rgba(0,0,0,.06));
  }
  .preview-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }
  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--ct-dim, #999);
    font-size: 12px;
    padding: 24px;
  }
  .hint {
    font-size: 11px;
    color: var(--ct-dim, #999);
    line-height: 1.45;
  }
  .error {
    display: none;
    color: var(--ct-danger, #dc2626);
    font-size: 11px;
    line-height: 1.45;
  }
  .settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .settings-panel {
    width: min(420px, 100%);
  }
  .settings-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
  }
  .settings-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="ct-toolbar">
      <div class="ct-toolbar-title">Builder</div>
      <div class="ct-pill" id="statusPill">empty</div>
      <button id="settingsBtn" type="button">Settings</button>
    </div>

    <div class="controls">
      <div class="ct-card">
        <div class="section-title" style="margin-bottom:8px;">Prompt</div>
        <textarea id="prompt" class="prompt" placeholder="Describe the design you want to generate or enhance."></textarea>
        <div class="controls-row" style="margin-top:10px;">
          <div class="segmented" id="variantCountControl">
            <button type="button" data-count="1">1</button>
            <button type="button" data-count="2">2</button>
            <button type="button" data-count="3">3</button>
          </div>
          <button id="generateBtn" type="button" class="primary">Generate</button>
        </div>
        <div class="hint" id="peerContextSummary" style="margin-top:10px;">The selected variant becomes the HTML attachment for the next chat send.</div>
        <div class="error" id="errorBox" style="margin-top:8px;"></div>
      </div>

      <div id="variantTabs" class="variant-tabs" style="display:none;"></div>
    </div>

    <div class="ct-card preview-card">
      <div class="preview-meta">
        <div class="preview-meta-left">
          <span id="statusDot" class="status-dot"></span>
          <div style="min-width:0;">
            <div id="previewTitle" class="preview-title">No variants yet</div>
            <div id="previewSubtitle" class="preview-subtitle">Generate 1, 2, or 3 variants from a single prompt.</div>
          </div>
        </div>
        <div class="ct-pill" id="variantCounter">0 variants</div>
      </div>
      <div class="preview-frame">
        <iframe id="preview" sandbox="allow-scripts allow-same-origin" title="Builder preview"></iframe>
        <div id="emptyState" class="empty">Enter a prompt, choose 1 / 2 / 3 variants, and generate.</div>
      </div>
    </div>
  </div>

  <div id="settingsOverlay" class="settings-overlay">
    <div class="ct-card settings-panel">
      <div class="ct-toolbar" style="padding:0 0 10px 0;border-bottom:none;">
        <div class="ct-toolbar-title">Builder settings</div>
      </div>
      <div class="settings-body">
        <label>
          <div class="section-title" style="margin-bottom:6px;">API Key</div>
          <input id="settApiKey" type="password" placeholder="sk-or-... or sk-...">
        </label>
        <label>
          <div class="section-title" style="margin-bottom:6px;">Model</div>
          <input id="settModel" type="text" placeholder="anthropic/claude-sonnet-4">
        </label>
        <label>
          <div class="section-title" style="margin-bottom:6px;">API Base URL</div>
          <input id="settBaseUrl" type="text" placeholder="https://openrouter.ai/api/v1">
        </label>
        <div class="settings-actions">
          <button id="settingsCancelBtn" type="button">Cancel</button>
          <button id="settingsSaveBtn" type="button" class="primary">Save</button>
        </div>
      </div>
    </div>
  </div>

<script>
  var DEFAULTS = { apiKey: '', model: 'anthropic/claude-sonnet-4', baseUrl: 'https://openrouter.ai/api/v1' };
  var EXAMPLES = [
    'A premium onboarding card',
    'A dark analytics summary module',
    'A glassy settings panel',
    'A compact dashboard hero',
    'A nicer version of this sketch'
  ];
  var SYSTEM_PROMPT = 'You are an expert UI builder. Return ONLY valid HTML or a full HTML document. Never return markdown, code fences, or prose. Produce polished, product-facing UI with strong hierarchy, restrained styling, and clean spacing. If asked for multiple variants, make each one meaningfully different in layout, hierarchy, and emphasis while preserving the same product intent.';

  var state = {
    config: loadConfig(),
    contexReady: false,
    variantCount: 3,
    variants: [],
    activeVariantId: null,
    generating: false,
    abortCtrl: null,
    peerContext: {},
  };

  function $(id) { return document.getElementById(id); }
  function loadConfig() { try { var raw = localStorage.getItem('builder-config'); return raw ? Object.assign({}, DEFAULTS, JSON.parse(raw)) : Object.assign({}, DEFAULTS); } catch (e) { return Object.assign({}, DEFAULTS); } }
  function saveConfig(config) { localStorage.setItem('builder-config', JSON.stringify(config)); }
  function uid(prefix) { return prefix + '-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8); }
  function activeVariant() { return state.variants.find(function(variant) { return variant.id === state.activeVariantId; }) || null; }
  function escapeHtml(text) { return String(text || '').replace(/[&<>"']/g, function(ch) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch]; }); }
  function truncate(text, len) { var value = String(text || '').trim(); return value.length > len ? value.slice(0, len - 1) + '…' : value; }

  function stripFences(text) {
    if (!text) return '';
    return String(text).replace(/^```[\w-]*\s*/gm, '').replace(/\s*```$/gm, '').trim();
  }

  function extractHtmlOnly(raw) {
    var text = stripFences(raw || '').trim();
    if (!text) return '';
    var docMatch = text.match(/<!doctype html[\s\S]*<\/html>/i);
    if (docMatch) return docMatch[0].trim();
    var htmlMatch = text.match(/<html[\s\S]*<\/html>/i);
    if (htmlMatch) return htmlMatch[0].trim();
    var firstTag = text.search(/</);
    if (firstTag > 0) text = text.slice(firstTag).trim();
    var lastTagClose = text.lastIndexOf('>');
    if (lastTagClose >= 0) text = text.slice(0, lastTagClose + 1).trim();
    return text;
  }

  function buildSrcdoc(raw) {
    var html = extractHtmlOnly(raw || '');
    if (!html) return '';
    var trimmed = html.trim().toLowerCase();
    if (trimmed.indexOf('<!doctype') === 0 || trimmed.indexOf('<html') === 0) return html;
    return '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"><\/script><style>*{box-sizing:border-box}body{margin:0;padding:16px;font-family:system-ui,-apple-system,sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center}</style></head><body>' + html + '</body></html>';
  }

  function showError(message) {
    $('errorBox').style.display = 'block';
    $('errorBox').textContent = message;
  }

  function hideError() {
    $('errorBox').style.display = 'none';
    $('errorBox').textContent = '';
  }

  function setGenerating(value) {
    state.generating = value;
    $('generateBtn').disabled = value || !state.config.apiKey;
    $('statusPill').textContent = value ? 'generating' : (state.variants.length ? 'ready' : 'empty');
    $('statusDot').className = 'status-dot ' + (value ? 'generating' : (state.variants.length ? 'ready' : ''));
  }

  function setVariantCount(count) {
    state.variantCount = count;
    Array.prototype.forEach.call(document.querySelectorAll('#variantCountControl button'), function(button) {
      button.classList.toggle('active', Number(button.getAttribute('data-count')) === count);
    });
  }

  function publishChatSurfacePayload(htmlValue) {
    if (!window.contex || !window.contex.surface) return;
    var cleanHtml = extractHtmlOnly(htmlValue || '');
    if (!cleanHtml) {
      window.contex.surface.clear();
      return;
    }
    window.contex.surface.setPayload({ kind: 'text', data: cleanHtml, mime: 'text/html', ext: 'html' });
  }

  function publishBuilderContext(status, errorMessage) {
    if (!state.contexReady || !window.contex || !window.contex.context) return;
    var selected = activeVariant();
    var summaries = state.variants.map(function(variant, index) {
      return {
        id: variant.id,
        label: variant.label,
        index: index,
        prompt: truncate(variant.prompt, 140),
        html: truncate(variant.html, 160),
      };
    });
    window.contex.context.set('ctx:artifact:ready', !!selected);
    window.contex.context.set('ctx:artifact:status', status || (state.generating ? 'generating' : (selected ? 'ready' : 'empty')));
    window.contex.context.set('ctx:artifact:html', selected ? selected.html : '');
    window.contex.context.set('ctx:artifact:variants', summaries);
    window.contex.context.set('ctx:builder:variantCount', state.variantCount);
    if (errorMessage !== undefined) window.contex.context.set('ctx:artifact:error', errorMessage || null);
    publishChatSurfacePayload(selected ? selected.html : '');
  }

  function peerContextText() {
    var lines = [];
    Object.keys(state.peerContext).forEach(function(peerId) {
      var bucket = state.peerContext[peerId] || {};
      Object.keys(bucket).forEach(function(key) {
        var value = bucket[key];
        var rendered = typeof value === 'string' ? value : JSON.stringify(value);
        lines.push('[' + peerId + '] ' + key + ': ' + truncate(rendered, 180));
      });
    });
    return lines.length ? '\n\nPeer context:\n' + lines.join('\n') : '';
  }

  function buildUserPrompt(basePrompt, index, total) {
    var intro = total > 1
      ? 'Generate variant ' + index + ' of ' + total + '. Make it meaningfully different in hierarchy, composition, spacing, and emphasis while keeping the same product intent.'
      : 'Generate a polished premium UI from this prompt.';
    return [intro, basePrompt.trim(), peerContextText()].filter(Boolean).join('\n\n');
  }

  async function generateVariants() {
    var prompt = $('prompt').value.trim();
    if (!prompt || state.generating || !state.config.apiKey) return;
    hideError();
    if (state.abortCtrl) state.abortCtrl.abort();
    state.abortCtrl = new AbortController();
    state.variants = [];
    state.activeVariantId = null;
    setGenerating(true);
    render();

    try {
      for (var i = 1; i <= state.variantCount; i++) {
        var variant = {
          id: uid('variant'),
          label: 'Variant ' + i,
          prompt: prompt,
          html: '',
          status: 'generating'
        };
        state.variants.push(variant);
        state.activeVariantId = variant.id;
        render();

        var response = await fetch(state.config.baseUrl.replace(/\/+$/, '') + '/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + state.config.apiKey
          },
          body: JSON.stringify({
            model: state.config.model,
            stream: true,
            max_tokens: 16384,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: buildUserPrompt(prompt, i, state.variantCount) }
            ]
          }),
          signal: state.abortCtrl.signal
        });
        if (!response.ok) {
          var problem = await response.json().catch(function() { return {}; });
          throw new Error((problem.error && problem.error.message) || ('API error ' + response.status));
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var accumulated = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var lineIndex = 0; lineIndex < lines.length; lineIndex++) {
            var line = lines[lineIndex].trim();
            if (!line || line.indexOf('data: ') !== 0) continue;
            var data = line.slice(6);
            if (data === '[DONE]') continue;
            try {
              var parsed = JSON.parse(data);
              var choice = parsed.choices && parsed.choices[0] ? parsed.choices[0] : null;
              var content = choice && choice.delta && choice.delta.content;
              if (content) {
                accumulated += content;
                variant.html = extractHtmlOnly(accumulated);
                render();
              }
            } catch (err) {}
          }
        }
        variant.html = extractHtmlOnly(accumulated);
        variant.status = variant.html ? 'ready' : 'error';
        render();
      }
      publishBuilderContext('ready', null);
    } catch (error) {
      if (!(error && error.name === 'AbortError')) {
        showError(error.message || String(error));
        publishBuilderContext('error', error.message || String(error));
      }
    } finally {
      state.abortCtrl = null;
      setGenerating(false);
      render();
    }
  }

  function renderTabs() {
    var root = $('variantTabs');
    root.innerHTML = '';
    root.style.display = state.variants.length > 0 ? 'flex' : 'none';
    state.variants.forEach(function(variant) {
      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'variant-tab' + (variant.id === state.activeVariantId ? ' active' : '');
      button.textContent = variant.label;
      button.onclick = function() {
        state.activeVariantId = variant.id;
        render();
      };
      root.appendChild(button);
    });
  }

  function renderPreview() {
    var selected = activeVariant();
    $('variantCounter').textContent = state.variants.length + ' variant' + (state.variants.length === 1 ? '' : 's');
    if (!selected || !selected.html) {
      $('preview').style.display = 'none';
      $('preview').srcdoc = '';
      $('emptyState').style.display = 'flex';
      $('previewTitle').textContent = state.generating ? 'Generating variants…' : 'No variants yet';
      $('previewSubtitle').textContent = state.generating ? 'Streaming the current variant into the preview.' : 'Generate 1, 2, or 3 variants from a single prompt.';
      return;
    }
    $('preview').style.display = 'block';
    $('emptyState').style.display = 'none';
    $('preview').srcdoc = buildSrcdoc(selected.html);
    $('previewTitle').textContent = selected.label;
    $('previewSubtitle').textContent = truncate(selected.prompt, 140) || 'Builder output';
  }

  function renderPeerSummary() {
    var count = 0;
    Object.keys(state.peerContext).forEach(function(peerId) {
      count += Object.keys(state.peerContext[peerId] || {}).length;
    });
    $('peerContextSummary').textContent = count > 0
      ? count + ' context item' + (count === 1 ? '' : 's') + ' from other chat surfaces will be included.'
      : 'The selected variant becomes the HTML attachment for the next chat send.';
  }

  function render() {
    renderTabs();
    renderPreview();
    renderPeerSummary();
    publishBuilderContext(state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'), null);
  }

  function openSettings() {
    $('settApiKey').value = state.config.apiKey;
    $('settModel').value = state.config.model;
    $('settBaseUrl').value = state.config.baseUrl;
    $('settingsOverlay').style.display = 'flex';
  }

  function closeSettings() {
    $('settingsOverlay').style.display = 'none';
  }

  function saveSettingsFromUI() {
    state.config.apiKey = $('settApiKey').value.trim();
    state.config.model = $('settModel').value.trim() || DEFAULTS.model;
    state.config.baseUrl = $('settBaseUrl').value.trim() || DEFAULTS.baseUrl;
    saveConfig(state.config);
    closeSettings();
    hideError();
    setGenerating(false);
    render();
  }

  function initExamples() {
    EXAMPLES.forEach(function(example) {
      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'variant-tab';
      button.textContent = example;
      button.onclick = function() {
        $('prompt').value = example;
        $('prompt').focus();
      };
      $('variantTabs').appendChild(button);
    });
    $('variantTabs').innerHTML = '';
  }

  function initContex() {
    if (!window.contex || state.contexReady) return;
    state.contexReady = true;
    if (window.contex.context) {
      window.contex.context.onPeerContextChanged(function(data) {
        if (!data.peerId || !data.key) return;
        state.peerContext[data.peerId] = state.peerContext[data.peerId] || {};
        state.peerContext[data.peerId][data.key] = data.value;
        render();
      });
    }
    if (window.contex.actions) {
      window.contex.actions.register('generate', 'Generate Builder variants from a prompt', function(params) {
        var prompt = params && (params.prompt || params.description) ? String(params.prompt || params.description) : '';
        if (!prompt) return { ok: false, error: 'Missing prompt' };
        $('prompt').value = prompt;
        if (params && params.variantCount) {
          var nextCount = Number(params.variantCount);
          if (nextCount >= 1 && nextCount <= 3) setVariantCount(nextCount);
        }
        setTimeout(generateVariants, 50);
        return { ok: true, status: 'generating' };
      });
      window.contex.actions.register('setHtml', 'Set the current Builder HTML directly', function(params) {
        var html = params && (params.html || params.content) ? String(params.html || params.content) : '';
        var cleanHtml = extractHtmlOnly(html);
        if (!cleanHtml) return { ok: false, error: 'Missing html' };
        state.variants = [{ id: uid('variant'), label: 'Variant 1', prompt: $('prompt').value.trim(), html: cleanHtml, status: 'ready' }];
        state.activeVariantId = state.variants[0].id;
        render();
        return { ok: true };
      });
      window.contex.actions.register('getHtml', 'Get the selected Builder HTML', function() {
        var selected = activeVariant();
        return { html: selected ? selected.html : '', variantCount: state.variants.length, status: state.generating ? 'generating' : (selected ? 'ready' : 'empty') };
      });
      window.contex.actions.register('getStatus', 'Get Builder generation status', function() {
        return { status: state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'), variantCount: state.variants.length, activeVariantId: state.activeVariantId };
      });
      window.contex.actions.register('setPrompt', 'Set the current Builder prompt', function(params) {
        $('prompt').value = params && params.prompt ? String(params.prompt) : '';
        return { ok: true };
      });
      window.contex.actions.register('setSettings', 'Update Builder settings', function(params) {
        if (params.model) state.config.model = String(params.model);
        if (params.baseUrl) state.config.baseUrl = String(params.baseUrl);
        if (params.apiKey) state.config.apiKey = String(params.apiKey);
        saveConfig(state.config);
        render();
        return { ok: true, model: state.config.model };
      });
    }
    if (window.contex.surface) {
      window.contex.surface.onRequestFlush(function() {
        publishBuilderContext(state.generating ? 'generating' : (state.variants.length ? 'ready' : 'empty'), null);
      });
      window.contex.surface.onClear(function() {
        if (state.abortCtrl) state.abortCtrl.abort();
        state.abortCtrl = null;
        state.variants = [];
        state.activeVariantId = null;
        state.generating = false;
        state.peerContext = {};
        $('prompt').value = '';
        hideError();
        setGenerating(false);
        render();
      });
    }
    render();
  }

  function bootstrap() {
    initExamples();
    Array.prototype.forEach.call(document.querySelectorAll('#variantCountControl button'), function(button) {
      button.onclick = function() { setVariantCount(Number(button.getAttribute('data-count'))); };
    });
    setVariantCount(state.variantCount);
    $('generateBtn').onclick = generateVariants;
    $('settingsBtn').onclick = openSettings;
    $('settingsCancelBtn').onclick = closeSettings;
    $('settingsSaveBtn').onclick = saveSettingsFromUI;
    $('settingsOverlay').onclick = function(event) { if (event.target === $('settingsOverlay')) closeSettings(); };
    $('prompt').addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
        event.preventDefault();
        generateVariants();
      }
    });
    if (!state.config.apiKey) showError('Set your API key in Builder settings to enable generation.');
    setGenerating(false);
    render();

    var initDone = false;
    function tryInitContex() {
      if (initDone || !window.contex) return;
      initDone = true;
      initContex();
    }
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'contex-bridge-ready') tryInitContex();
    });
    tryInitContex();
    setTimeout(tryInitContex, 0);
    setTimeout(tryInitContex, 50);
    setTimeout(tryInitContex, 150);
  }

  bootstrap();
</script>
</body>
</html>
